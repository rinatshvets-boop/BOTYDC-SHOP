<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Tutaj znajduje się discord, na którym będziesz mógł kupić własnego bota discord!</title>
  <style>
    /* pełnoekranowe tło z obrazka */
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      background-image: url("https://i.imgur.com/NWvnnMw.png"); /* obraz z Imgur */
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover; /* dopasowanie na całą stronę */
      font-family: Arial, sans-serif;
    }

    /* kontener na przycisk, wycentrowany w pionie i poziomie */
    .center-wrapper {
      height: 100%;
      display: flex;
      justify-content: center;  /* poziomo */
      align-items: center;      /* pionowo */
    }

    /* sam przycisk */
    .discord-btn {
      display: inline-block;
      background: #8b5cf6;          /* fiolet */
      color: white;
      padding: 24px 48px;           /* duży */
      border-radius: 18px;
      text-decoration: none;
      font-size: 24px;              /* duża czcionka */
      font-weight: bold;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      transition: 0.2s ease;
    }

    .discord-btn:hover {
      background: #7c3aed;
      transform: scale(1.08);
    }
  </style>
</head>
<body>
  <div class="center-wrapper">
    <a href="https://discord.gg/KuKjzrxjV4"
       class="discord-btn"
       target="_blank"
       rel="noopener noreferrer">
      Dołącz na mój Discord
    </a>
  </div>
</body>
</html>
